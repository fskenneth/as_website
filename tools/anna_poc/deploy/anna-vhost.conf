# Apache vhost for anna.astrastaging.com
#
# Place at /etc/apache2/sites-available/anna-astrastaging.conf, then:
#   a2enmod proxy proxy_http
#   a2ensite anna-astrastaging
#   apache2ctl configtest && systemctl reload apache2
#   certbot --apache -d anna.astrastaging.com   # generates the *-le-ssl.conf
#
# Anna handles HTTPS signaling (the /offer SDP exchange + the static page).
# WebRTC media is direct-to-aiortc UDP and bypasses Apache entirely — UDP
# must be open in UFW for the kernel ephemeral range (32768-65535).

<VirtualHost *:80>
    ServerName anna.astrastaging.com

    # Forward to the systemd-managed Pipecat process on loopback.
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:7860/
    ProxyPassReverse / http://127.0.0.1:7860/

    # Don't cache anything — voice agent state is per-call.
    Header always set Cache-Control "no-store"

    ErrorLog  ${APACHE_LOG_DIR}/anna-error.log
    CustomLog ${APACHE_LOG_DIR}/anna-access.log combined
</VirtualHost>
